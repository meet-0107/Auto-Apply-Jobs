<div class="layout-main-flex" id="dashboard-section">
    <div class="content-left">
        <div class="metrics-row">
            <div class="glass" id="card-total-applications" style="cursor: pointer;">
                <div class="card-label">Applications <small>Total</small></div>
                <div class="metric-value">
                    <span class="number" id="total-applications-count">0</span>
                    <span class="trend up">Live</span>
                </div>
            </div>
            <div class="glass" id="card-match-profile" style="cursor: pointer;">
                <div class="card-label">Match Profile <small>Total</small></div>
                <div class="metric-value">
                    <span class="number" id="match-profile-count">0</span>
                    <span class="trend up">High Match</span>
                </div>
            </div>
            <div class="glass" id="card-automation-application" style="cursor: pointer;">
                <div class="card-label">Automation Application</div>
                <div class="metric-value">
                    <span class="number" id="automation-app-count">0</span>
                    <span class="trend up">Applied</span>
                </div>
            </div>
        </div>

    </div>


</div>
