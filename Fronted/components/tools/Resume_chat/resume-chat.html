<div class="chat-wrapper">
    <!-- Sidebar -->
    <aside class="chat-sidebar glass">
        <div class="chat-sidebar-header">
            <button id="new-chat-btn" class="btn-primary-premium">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                New Chat
            </button>
        </div>
        <div class="chat-history-list" id="chat-history-list">
            <!-- Populated by JS -->
        </div>
    </aside>
    <!-- Main Chat Area -->
    <main class="chat-main glass">
        <div class="chat-header">
            <h3 id="current-chat-title">New Chat</h3>
            <div class="chat-header-actions">
                <button id="rename-chat-btn" class="icon-btn" title="Rename Chat" style="display: none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
                <button id="delete-chat-btn" class="icon-btn" title="Delete Chat" style="display: none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Empty State -->
            <div id="chat-empty-state" class="chat-empty-state">
                <div class="empty-state-content">
                    <div class="ai-logo-large" style="background: transparent; box-shadow: none;">
                        <img src="/asset/logo.svg" alt="Autly AI" width="64" height="64">
                    </div>
                    <p>Ask anything about your resume, career path, or job matches.</p>
                    <div class="suggestion-grid">
                        <button class="suggestion-card" onclick="setInputValue('Analyze my resume skills')">
                            <span>Analyze my resume skills</span>
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <path d="m9 18 6-6-6-6"></path>
                            </svg>
                        </button>
                        <button class="suggestion-card" onclick="setInputValue('How can I improve my LinkedIn?')">
                            <span>Improve my LinkedIn profile</span>
                            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <path d="m9 18 6-6-6-6"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            <!-- Messages will go here -->
            <div id="messages-list"></div>
        </div>
        <div class="chat-input-area">
            <div class="typing-indicator" id="chat-typing-indicator" style="display: none;">AI is
                thinking<span>.</span><span>.</span><span>.</span></div>
            <div class="file-preview-container" id="file-preview-container" style="display: none;">
                <div class="file-preview">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                        <polyline points="13 2 13 9 20 9"></polyline>
                    </svg>
                    <span id="file-preview-name">filename.pdf</span>
                    <button type="button" class="remove-file-btn" id="remove-file-btn">&times;</button>
                </div>
            </div>
            <div class="chat-form-container">
                <form id="chat-form" class="chat-form">
                    <label for="chat-file-upload" class="icon-btn attach-btn" title="Attach File">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                            </path>
                        </svg>
                    </label>
                    <input type="file" id="chat-file-upload" accept=".txt,.pdf,.docx" style="display: none;">
                    <textarea id="chat-input" placeholder="Message Autly AI..." rows="1"></textarea>
                    <button type="submit" class="btn-primary-premium send-btn" id="send-msg-btn" disabled>
                        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </main>
</div>
