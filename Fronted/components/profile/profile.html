<section class="glass profile-card" id="profile-section">
    <div class="profile-header-integrated">
        <div class="profile-title-group">
            <h3><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg> Profile Details</h3>
            <p class="subtitle">Keep your information updated for better job matches.</p>
        </div>
        <div class="profile-health-integrated">
            <div class="circular-chart-small">
                <svg viewBox="0 0 36 36" class="circular-svg">
                    <path class="circle-bg"
                        d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path class="circle" stroke-dasharray="0, 100" id="health-circle"
                        d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <text x="18" y="20.35" class="percentage" id="health-percentage-text">0%</text>
                </svg>
            </div>
            <div class="health-info-small">
                <span class="health-label">Completion</span>
                <small id="health-tip">Fill details to reach 100%.</small>
            </div>
        </div>
    </div>
    <div class="profile-form">
        <div class="form-group">
            <label>Full Name <span class="required-mark">*</span></label>
            <input type="text" id="profile-fullname" class="track-completion" placeholder="Enter full name">
        </div>
        <div class="form-group">
            <label>Email <span class="required-mark">*</span></label>
            <input type="email" id="profile-email" class="track-completion" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>LinkedIn URL <span class="optional-mark">(optional)</span></label>
            <input type="url" id="profile-linkedin" class="track-completion" placeholder="LinkedIn URL">
        </div>
        <div class="form-group">
            <label>GitHub URL <span class="optional-mark">(optional)</span></label>
            <input type="url" id="profile-github" class="track-completion" placeholder="GitHub URL">
        </div>
        <div class="form-group">
            <label>Portfolio URL <span class="optional-mark">(optional)</span></label>
            <input type="url" id="profile-portfolio" class="track-completion" placeholder="Portfolio URL">
        </div>
        <div class="form-group">
            <label>Job Type <span class="required-mark">*</span></label>
            <select id="profile-jobtype" class="track-completion">
                <option value="">Select Job Type</option>
                <option>Remote</option>
                <option>Hybrid</option>
                <option>On-site</option>
            </select>
        </div>
        <div class="form-group">
            <label>Location <span class="required-mark">*</span></label>
            <input type="text" id="profile-location" class="track-completion" placeholder="City, Country">
        </div>
        <div class="form-group">
            <label>Experience Level <span class="required-mark">*</span></label>
            <select id="profile-experience-level" class="track-completion">
                <option value="">Select Level</option>
                <option value="Fresher">Fresher</option>
                <option value="Junior">Junior (1-2 years)</option>
                <option value="Mid-Level">Mid-Level (3-5 years)</option>
                <option value="Senior">Senior (5+ years)</option>
            </select>
        </div>
        <div class="form-group" id="primary-skills-wrapper">
            <label>Primary Skills <span class="required-mark">*</span></label>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="text" id="profile-primary-skills-input" placeholder="e.g. Flutter, Dart, Python" style="flex: 1; margin: 0; padding-right: 45px;">
                <button type="button" id="add-skill-btn" style="position: absolute; right: 6px; width: 32px; height: 32px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">+</button>
            </div>
            <div id="skills-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
            <input type="hidden" id="profile-primary-skills" class="track-completion">
        </div>
        <div class="form-group">
            <label>Achievements <span class="optional-mark">(optional)</span></label>
            <textarea id="profile-achievements" class="track-completion"
                placeholder="Describe your achievements"></textarea>
        </div>
        <div class="form-group">
            <label>Upload Resume <span class="required-mark">*</span></label>
            <input type="file" id="profile-resume" class="track-completion">
        </div>
        <div class="profile-actions" style="margin-top: 30px;">
            <button class="btn submit" id="save-profile-btn">Save Profile Details</button>
        </div>
    </div>
</section>
